{% extends "shop/index.html" %}

{% block content %}
<div class="container" style="margin-top: 100px; margin-bottom: 100px;">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div style="background: white; padding: 30px; border-radius: 10px; shadow: 0 4px 8px rgba(0,0,0,0.1); border: 1px solid #ddd;">
                <h2 class="text-center" style="color: #002366; font-weight: bold; margin-bottom: 20px;">LOGIN</h2>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        {{ form.as_p }}
                    </div>
                    <button type="submit" class="btn w-100" style="background: #002366; color: white; font-weight: bold; padding: 10px;">
                        LOG IN
                    </button>
                </form>

                <div class="text-center mt-4">
                    <p>Naya account banana hai? <a href="{% url 'signup' %}" style="color: #25D366; font-weight: bold; text-decoration: none;">SIGN UP</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
